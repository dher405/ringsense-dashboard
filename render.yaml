services:
  - type: web
    name: ringsense-dashboard
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    disk:
      name: ringsense-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false  # Set manually in Render dashboard
